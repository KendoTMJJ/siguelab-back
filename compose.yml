services:
  api:
    build:
      context: .
      target: build
    command: pnpm run start:dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sigelab
      POSTGRES_PASSWORD: sigelab
      POSTGRES_DB: sigelab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
